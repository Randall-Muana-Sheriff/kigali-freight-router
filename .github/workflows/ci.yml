name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Ephemeral service containers give every CI run its own isolated
    # Postgres+PostGIS and Redis instance instead of depending on
    # always-on infrastructure via repo secrets.
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kigali_freight_coop_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests (in-memory state)
        env:
          PORT: 5000
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: kigali_freight_coop_ci
          JWT_SECRET: ci_test_secret_do_not_use_in_prod
          CORS_ORIGIN: http://localhost:5173
        run: npm run test:integration

      - name: Run integration tests (Redis-backed state)
        env:
          PORT: 5000
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: kigali_freight_coop_ci
          JWT_SECRET: ci_test_secret_do_not_use_in_prod
          CORS_ORIGIN: http://localhost:5173
          REDIS_URL: redis://localhost:6379
        run: node --test tests/integration.test.js

      - name: Audit production dependencies
        run: npm audit --audit-level=high

      - name: Build Docker image
        run: docker build -t kigali-freight-router:ci .

